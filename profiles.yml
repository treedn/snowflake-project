default:
  target: dev
  outputs:
    dev:
      type: bigquery
      method: service-account
      # Path to the BigQuery service-account JSON key. Set the DBT_BIGQUERY_KEYFILE env var
      # to point at your key (the default below is a convenient repo-local location).
      keyfile: "{{ env_var('DBT_BIGQUERY_KEYFILE', '/workspace/.secrets/bigquery-keyfile.json') }}"
      project: chef-master-8f916
      dataset: dbt_tri
      location: EU
      threads: 16
      priority: interactive
      dataproc_batch: null
