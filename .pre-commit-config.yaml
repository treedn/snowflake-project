# Local quality gates that run before each commit. Install with:
#   pip install pre-commit && pre-commit install
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict
      - id: detect-private-key          # block accidental key commits
      - id: check-added-large-files

  - repo: https://github.com/sqlfluff/sqlfluff
    rev: 3.2.5
    hooks:
      - id: sqlfluff-lint
        additional_dependencies: [dbt-bigquery, sqlfluff-templater-dbt]

  # dbt project hygiene: every model must be documented & every source/model
  # referenced must exist.
  - repo: https://github.com/dbt-checkpoint/dbt-checkpoint
    rev: v2.0.5
    hooks:
      - id: check-model-has-description
      - id: check-model-has-tests
        args: ["--test-cnt", "1", "--"]
        files: ^models/marts/
