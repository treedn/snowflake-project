# Name your project! Project names should contain only lowercase characters
# and underscores. A good package name should reflect your organization's
# name or the intended use of these models
name: "zero_one_games"
version: "1.0.0"
config-version: 2

# GA4 exports use wildcard tables (events_*, events_intraday_*). dbt Fusion/static analysis
# needs real table names to fetch columns. Use two suffixes: finalized daily shards and
# intraday shards often do not exist for the same calendar day (daily export can lag behind
# intraday, and old intraday partitions may be dropped). Pick each from BigQuery, e.g.:
#   SELECT table_name FROM `PROJECT.analytics_NNN.INFORMATION_SCHEMA.TABLES`
#   WHERE STARTS_WITH(table_name, 'events_') ORDER BY table_name DESC LIMIT 20;
# Do not use `events_*` / `events_intraday_*` as source identifiers: Fusion caches schemas
# under target/.lsp and '*' is invalid in Windows paths (dbt1016).
vars:
  # Latest `events_YYYYMMDD` table that exists (finalized export). Not always "yesterday".
  ga4_daily_schema_proxy_suffix: "20260417"
  # Recent `events_intraday_YYYYMMDD` table that exists (streaming partition).
  ga4_intraday_schema_proxy_suffix: "20260419"

dbt-cloud:
    project-id: 70471823519396

# This setting configures which "profile" dbt uses for this project.
profile: "default"

# These configurations specify where dbt should look for different types of files.
# The `model-paths` config, for example, states that models in this project can be
# found in the "models/" directory. You probably won't need to change these!
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target" # directory which will store compiled SQL files
clean-targets: # directories to be removed by `dbt clean`
  - "target"
  - "dbt_packages"

# Configuring models
# Full documentation: https://docs.getdbt.com/docs/configuring-models

# In dbt, the default materialization for a model is a view. This means, when you run
# dbt run or dbt build, all of your models will be built as a view in your data platform.
# The configuration below will override this setting for models in the example folder to
# instead be materialized as tables. Any models you add to the root of the models folder will
# continue to be built as views. These settings can be overridden in the individual model files
# using the `{{ config(...) }}` macro.

models:
  zero_one_games:
    # Archive layer: Archived data
    archive:
      +enabled: false

    # Analytics layer: Analytics models
    # Materialized as views for efficiency
    analytics:
      +materialized: view
      +schema: analytics
    
    # Staging layer: Lightweight transformations from source data
    # Materialized as views for efficiency
    staging:
      +materialized: view
      +schema: staging

    # Intermediate layer: Reusable transformations and business logic
    # Materialized as views for flexibility
    intermediate:
      +materialized: view
      +schema: intermediate

    # # Marts layer: Final business-ready datasets
    # # Materialized as tables for performance
    marts:
      +materialized: table
      +schema: marts
