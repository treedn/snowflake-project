version: 2

sources:
  - name: adjust
    database: chef-master-8f916
    schema: raw
    description: Adjust attribution + cohort metrics ingested by zero1-data pipeline.
    tables:
      - name: adjust_report
        description: Daily parquet_report from Adjust at network × campaign × adgroup × creative × country × os grain.
        # Freshness SLA: alert if the latest business day stops advancing.
        # `day` is the business date; we use it as a proxy for arrival because the
        # zero1-data pipeline truncates-and-reloads the last 7 days each run.
        config:
          loaded_at_field: "cast(day as timestamp)"
          freshness:
            warn_after: { count: 36, period: hour }
            error_after: { count: 72, period: hour }
