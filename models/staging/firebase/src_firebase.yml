version: 2

sources:
  - name: firebase_analytics
    database: chef-master-8f916
    schema: analytics_448269098
    tables:
      # Identifiers must not contain '*' — Windows cannot use '*' in filesystem paths,
      # and dbt Fusion/LSP caches sourced_remote schemas under target/.lsp.
      # Wildcard table names (events_*, events_intraday_*) are built in model SQL instead.
      # Identifiers are real shards for schema download only (see ga4_*_schema_proxy_suffix in dbt_project.yml).
      - name: events_wildcard
        identifier: "{{ 'events_' ~ var('ga4_daily_schema_proxy_suffix') }}"
        description: >
          Finalized event data exported from Firebase Analytics to BigQuery.
          Date-sharded table; queries must use the wildcard suffix and
          filter by _TABLE_SUFFIX.

      - name: events_intraday_wildcard
        identifier: "{{ 'events_intraday_' ~ var('ga4_intraday_schema_proxy_suffix') }}"
        description: >
          Today's streaming events exported from Firebase Analytics to BigQuery.
          Updated continuously throughout the day. Tomorrow this data will be
          replaced by the finalized version in events_YYYYMMDD.
