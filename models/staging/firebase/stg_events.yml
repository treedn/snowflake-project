version: 2

models:
  - name: stg_events
    description: >
      Unified view over stg_events_daily + stg_events_intraday. This is the
      table downstream models and analyses should query. See STG_EVENTS.md
      for full schema and example queries.
    columns:
      - name: event_date
        tests: [not_null]
      - name: event_timestamp
        tests: [not_null]
      - name: event_name
        tests: [not_null]
      - name: user_first_touch_timestamp
        tests: [not_null]

      # ----------------------------------------------------------------------
      # PII / sensitive identifiers.
      # `contains_pii` drives our governance posture: these columns are masked
      # in-pipeline (user_id) and/or protected with BigQuery policy tags +
      # dynamic data masking and authorized views in prod. See
      # docs/data_governance.md.
      # ----------------------------------------------------------------------
      - name: user_id
        description: >
          Cross-device account id. Pseudonymised in staging with a salted
          SHA-256 (macros/mask_pii.sql) — only the hash is ever persisted.
        config:
          meta:
            contains_pii: true
            masking_policy: hash_sha256
      - name: user_pseudo_id
        description: >
          Firebase-assigned pseudonymous device id (already pseudonymous; kept
          raw because every cohort/retention/session join keys on it). Treated
          as PII for access-control purposes.
        config:
          meta:
            contains_pii: true
            masking_policy: policy_tag
      - name: geo_city
        description: City-level geo. Quasi-identifier — restricted via policy tag in prod.
        config:
          meta:
            contains_pii: true
            masking_policy: policy_tag
      - name: device_mobile_model_name
        description: Device model — quasi-identifier when combined with geo.
        config:
          meta:
            contains_pii: true
            masking_policy: policy_tag
      - name: device_category
        tests:
          - accepted_values:
              arguments:
                values: ['mobile', 'tablet']
      - name: device_operating_system
        tests:
          - accepted_values:
              arguments:
                values: ['Android', 'iOS']
      - name: app_version
        tests: [not_null]
      - name: platform
        tests:
          - accepted_values:
              arguments:
                values: ['ANDROID', 'IOS']
      - name: amount
        tests:
          - not_null:
              config:
                where: "event_name IN ('currency_spent', 'currency_earned')"
      - name: currency_type
        tests:
          - not_null:
              config:
                where: "event_name IN ('currency_spent', 'currency_earned')"
          - accepted_values:
              arguments:
                values: ['Gems', 'Coins']
              config:
                where: "event_name IN ('currency_spent', 'currency_earned')"
      - name: price
        tests:
          - not_null:
              config:
                where: "event_name = 'in_app_purchase'"
      - name: price_gems
        tests:
          - not_null:
              config:
                where: "event_name = 'iap_purchase'"
